<!DOCTYPE html>
<html lang="bn"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ECC Players</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
body{font-family:'Noto Sans Bengali',sans-serif;background:#0f0f0f;color:#fff;margin:0}
.header{text-align:center;padding:30px;background:#780000}.logo{width:100px}
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:20px}
.player-card{background:#181818;border-radius:16px;overflow:hidden}
.player-card img{width:100%;height:220px;object-fit:cover}
.player-body{padding:15px}.player-name{color:#ffd166;font-size:22px;font-weight:bold}
</style></head><body>
<div class="header"><h1>🏏 নিবন্ধিত খেলোয়াড়</h1><h2 id="playerCount">0</h2></div>
<div style="padding:20px"><input id="searchInput" placeholder="খেলোয়াড় খুঁজুন..." style="width:100%;padding:12px"></div>
<div id="playersContainer" class="players-grid"></div>
<script>
const csvUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vQcFJVhBEu70fwcoRZ3Bf7cqsJPAqcJDKErwenAKlDkU4HRNO6Ch1dR-Zb60t_73pHS5jGlNbE4MwVY/pub?output=csv";
const defaultAvatar="https://cdn-icons-png.flaticon.com/512/147/147142.png";
let allPlayers=[];
function card(p){return `<div class='player-card'><img src='${defaultAvatar}'><div class='player-body'><div class='player-name'>${p.name}</div><div>🎂 ${p.age}</div><div>📍 ${p.address}</div><div>🏏 ${p.role}</div><div>✋ ${p.batting}</div><div>🎯 ${p.bowling}</div><div>🏆 ${p.experience}</div><div>🏟️ ${p.tournament}</div><div>⭐ ${p.achievement}</div></div></div>`}
function render(arr){document.getElementById('playersContainer').innerHTML=arr.map(card).join('');}
Papa.parse(csvUrl,{download:true,header:true,skipEmptyLines:true,complete:r=>{allPlayers=r.data;document.getElementById('playerCount').innerText=allPlayers.length;render(allPlayers.map(x=>({
name:x["খেলোয়াড়ের পূর্ণ নাম"]||"",
age:x["বর্তমান বয়স"]||"",
address:x["বর্তমান ঠিকানা"]||"",
role:x["আপনার ক্রিকেট খেলার প্রধান ভূমিকা কী?"]||"",
batting:x["ব্যাটিং স্টাইল"]||"",
bowling:x["বোলিং স্টাইল"]||"",
experience:x["পূর্বে কোনো টুর্নামেন্ট খেলেছেন?"]||"",
tournament:x["পূর্বে খেলা টুর্নামেন্টের নাম"]||"",
achievement:x["আপনার সবচেয়ে বড় ক্রিকেট অর্জন"]||""
})));}});
</script></body></html>
