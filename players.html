<!DOCTYPE html>

<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>নিবন্ধিত খেলোয়াড় | ECC</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
background:#0f0f0f;
color:#fff;
font-family:'Noto Sans Bengali',sans-serif;
margin:0;
padding:0;
}

.header{
text-align:center;
padding:30px;
background:linear-gradient(135deg,#780000,#111);
}

.header h1{
color:#ffd166;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.counter{
text-align:center;
font-size:22px;
margin:20px 0;
color:#ffd166;
font-weight:bold;
}

.search-box{
text-align:center;
margin-bottom:25px;
}

.search-box input{
width:100%;
max-width:500px;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

.players-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.player-card{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
border:1px solid #333;
}

.player-img{
height:220px;
background:url('https://i.imgur.com/ZK7fK8T.png') center/cover;
}

.player-content{
padding:15px;
}

.player-content h3{
margin:0 0 10px;
color:#ffd166;
}

.player-content p{
margin:6px 0;
}

.loading{
text-align:center;
padding:40px;
font-size:20px;
}

</style>

</head>
<body>

<div class="header">
<h1>🏏 নিবন্ধিত খেলোয়াড়</h1>
</div>

<div class="container">

<div class="counter" id="playerCount">
লোড হচ্ছে...
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="খেলোয়াড় খুঁজুন...">
</div>

<div id="players" class="players-grid">
<div class="loading">ডাটা লোড হচ্ছে...</div>
</div>

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQcFJVhBEu70fwcoRZ3Bf7cqsJPAqcJDKErwenAKlDkU4HRNO6Ch1dR-Zb60t_73pHS5jGlNbE4MwVY/pub?output=csv";

let allPlayers=[];

fetch(CSV_URL)
.then(res=>res.text())
.then(csv=>{

const rows=csv.split("\n").map(r=>r.split(","));

const headers=rows[0];

function getIndex(keyword){
return headers.findIndex(h=>h.includes(keyword));
}

const nameIndex=getIndex("পূর্ণ নাম");
const ageIndex=getIndex("বয়স");
const roleIndex=getIndex("ভূমিকা");
const batIndex=getIndex("ব্যাটিং");
const bowlIndex=getIndex("বোলিং");
const expIndex=getIndex("টুর্নামেন্ট");

allPlayers=rows.slice(1)
.filter(r=>r.length>3)
.map(r=>({

name:r[nameIndex] || "",
age:r[ageIndex] || "",
role:r[roleIndex] || "",
bat:r[batIndex] || "",
bowl:r[bowlIndex] || "",
exp:r[expIndex] || ""

}));

renderPlayers(allPlayers);

});

function renderPlayers(players){

document.getElementById("playerCount").innerHTML=
"🏏 মোট নিবন্ধিত খেলোয়াড়: "+players.length+" জন";

const container=document.getElementById("players");

container.innerHTML=players.map(player=>`

<div class="player-card">

<div class="player-img"></div>

<div class="player-content">

<h3>${player.name}</h3>

<p>🎂 বয়স: ${player.age}</p>

<p>🏏 ভূমিকা: ${player.role}</p>

<p>✋ ব্যাটিং: ${player.bat}</p>

<p>🎯 বোলিং: ${player.bowl}</p>

<p>🏆 অভিজ্ঞতা: ${player.exp}</p>

</div>

</div>

`).join('');

}

document.getElementById("searchInput")
.addEventListener("input",function(){

const q=this.value.toLowerCase();

const filtered=allPlayers.filter(p=>
p.name.toLowerCase().includes(q)
);

renderPlayers(filtered);

});

</script>

</body>
</html>
